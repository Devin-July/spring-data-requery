sonar.projectKey=Devin-July_spring-data-requery
sonar.organization=devin-july
sonar.host.url=https://sonarcloud.io
sonar.login=${SONAR_TOKEN}

# Project metadata
sonar.projectName=Spring Data Requery
sonar.projectVersion=1.0

# Source configuration - Kotlin only since Java requires binaries
sonar.sources=spring-data-requery-kotlin/src/main/kotlin

# Kotlin configuration
sonar.kotlin.source=1.3

# Exclude Java files since we can't provide binaries, and exclude build directories
sonar.exclusions=**/build/**,**/.gradle/**,**/target/**,**/out/**,**/*.java
